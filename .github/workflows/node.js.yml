name: NeaPay API – CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/thejulyaure/neapay-api
  CONTAINER_NAME: neapay-api

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: neapay-ci-cd
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          IMAGE_TAG=sha-${SHORT_SHA}
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.tag.outputs.image_tag }} -t $IMAGE_NAME:latest .

      - name: Push Docker image (both tags)
        run: |
          docker push $IMAGE_NAME:${{ steps.tag.outputs.image_tag }}
          docker push $IMAGE_NAME:latest

  deploy-self-hosted:
    name: Deploy to Self‑Hosted Runner
    runs-on: [self-hosted, neapay-runner]
    needs: build-and-push
    environment: production

    steps:
      - name: Wait for image tag
        run: echo "Deploying image ${{ needs.build-and-push.outputs.image-tag }}"

      - name: Ensure GHCR login on runner
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: |
          docker pull $IMAGE_NAME:${{ needs.build-and-push.outputs.image-tag }}
          docker tag $IMAGE_NAME:${{ needs.build-and-push.outputs.image-tag }} $IMAGE_NAME:latest

      - name: Run deploy script (idempotent)
        run: |
          # deploy.sh should live at /srv/neapay/deploy.sh and be executable
          if [ -x /srv/neapay/deploy.sh ]; then
            /srv/neapay/deploy.sh
          else
            echo "/srv/neapay/deploy.sh not found or not executable"
            exit 1
          fi
