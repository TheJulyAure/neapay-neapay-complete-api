global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: neapay

scrape_configs:
  - job_name: 'neapay-api'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'neapay-frontend'
    static_configs:
      - targets: ['localhost:5173']
    scrape_interval: 15s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'docker-daemon'
    static_configs:
      - targets: ['unix:///var/run/docker.sock']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
