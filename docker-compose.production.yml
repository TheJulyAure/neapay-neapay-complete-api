version: '3.8'

services:
  penthouse-api:
    build:
      context: ./penthouse-api
      dockerfile: Dockerfile
    image: neapay-api:latest
    container_name: penthouse-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL:-postgresql://neapay:password@postgres:5432/neapay}
      REDIS_URL: ${REDIS_URL:-redis://:password@redis:6379}
      API_KEY: ${API_KEY:-api-key}
      SECRET_KEY: ${SECRET_KEY:-secret-key}
    networks:
      - unified
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs/api:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: neapay-frontend:latest
    container_name: neapay-frontend
    restart: always
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: ${API_URL:-https://api.neapay.com}
      VITE_ENV: production
    networks:
      - unified
    depends_on:
      penthouse-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ./logs/frontend:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  postgres:
    image: postgres:15-alpine
    container_name: neapay-postgres
    restart: always
    environment:
      POSTGRES_USER: neapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: neapay
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    networks:
      - unified
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neapay"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: neapay-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change-me}
    networks:
      - unified
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    container_name: neapay-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - unified
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    container_name: neapay-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: 'grafana-clock-panel,grafana-simple-json-datasource'
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - unified
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  unified:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-storage:
